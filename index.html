<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contesto Italiano - Material You</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col items-center min-h-screen p-4 pb-40">

    <header class="w-full max-w-md mt-6 mb-8 text-center">
        <h1 class="text-4xl font-bold tracking-tight text-slate-800">Contesto</h1>
        <p class="opacity-60 mt-1 font-medium">Trova la parola segreta</p>
        
        <div class="flex justify-center gap-2 mt-4">
            <button id="ai-hint-btn" class="text-xs bg-white border border-slate-200 px-3 py-2 rounded-full shadow-sm hover:shadow-md transition-all flex items-center gap-1 text-slate-700 font-medium">
                ✨ Suggerimento
            </button>
            <button id="ai-analyze-btn" class="text-xs bg-white border border-slate-200 px-3 py-2 rounded-full shadow-sm hover:shadow-md transition-all flex items-center gap-1 text-slate-700 font-medium">
                ✨ Analizza
            </button>
        </div>
    </header>

    <main id="game-container" class="w-full max-w-md">
        <div id="ai-assistant-box" class="bg-blue-50 border border-blue-100 rounded-2xl p-4 relative">
            <div class="ai-badge mb-2"><span>✨ Puter AI</span></div>
            <p id="ai-response-text" class="text-sm text-blue-900 leading-relaxed"></p>
            <button onclick="closeAIBox()" class="absolute top-3 right-3 text-blue-400 hover:text-blue-600">✕</button>
        </div>

        <div id="guesses-container" class="flex flex-col-reverse"></div>
        
        <div id="empty-state" class="py-24 text-center opacity-30 flex flex-col items-center">
            <svg class="mb-4" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <p class="text-xl">Digita una parola per iniziare</p>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 p-6 bg-white/90 backdrop-blur-xl border-t border-gray-100 flex justify-center z-50">
        <div class="w-full max-w-md flex gap-3 items-center">
            <input type="text" id="word-input" autocomplete="off" placeholder="Prova una parola..." class="md-input flex-1 text-lg">
            <button id="submit-btn" class="btn-fab flex items-center justify-center">
                <div class="loader" id="loader"></div>
                <svg id="send-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </button>
        </div>
    </footer>

    <script type="module" src="script.js"></script>
</body>
</html>
